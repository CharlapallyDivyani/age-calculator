<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>Age Calculator</h2>
        <p class="subtitle">Enter your date of birth to calculate your exact age.</p>
        
        <div class="result-container" id="result-container">
            <div class="result-card">
                <span class="result-number" id="years">-</span>
                <span class="result-label">Years</span>
            </div>
            <div class="result-card">
                <span class="result-number" id="months">-</span>
                <span class="result-label">Months</span>
            </div>
            <div class="result-card">
                <span class="result-number" id="days">-</span>
                <span class="result-label">Days</span>
            </div>
        </div>

        <div class="extra-stats" id="extra-stats" style="display: none; margin-top: 25px; border-top: 1px solid #e5e7eb; padding-top: 20px;">
            <h3 style="font-size: 1.1rem; color: var(--text-main); margin-bottom: 12px;">Your Life in Numbers</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 6px;">Total Days Lived: <strong id="total-days" style="color: var(--primary-color);">0</strong></p>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Next Birthday In: <strong id="next-birthday-countdown" style="color: var(--primary-color);">-</strong></p>
        </div>
        
        <div class="input-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
        
        <button id="calculate-btn">Calculate Age</button>
        
        <p class="error-message" id="error-txt" style="display: none; color: red; margin-top: 10px;"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
